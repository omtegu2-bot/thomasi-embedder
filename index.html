<!DOCTYPE html>
<html>
<style>
button {
  width: 100vw;
  height: 100vh;
  display: block;
  border: none;
  margin: 0;
  font-size: 2rem;
}
</style>

<body>
<button onclick="openLauncher()">CLICK!</button>

<script>
function openLauncher() {
    var win = window.open('about:blank', '_blank');


    var sites = [
        { name: "Omtegu Embedder + Games", url: "https://lkarch.org/omtegu/embedder.html" },
        { name: "Himespider - Games", url: "https://studying.work.gd/games.html" },
        { name: "Unblocked Internet ", url: "https://scr.koyeb.app/" }
    ];

    let buttonsHTML = "";
    for (let i = 0; i < sites.length; i++) {
        buttonsHTML += `
            <button class="launch-btn" onclick="loadSite('${sites[i].url}')">
                ${sites[i].name}
            </button>
        `;
    }

    win.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
        <style>
            body {
                margin: 0;
                background: #000;
                font-family: sans-serif;
                color: #a855f7;
                display: flex;
                justify-content: center;
                align-items: flex-start;
padding-top: 10vh;
                height: 100vh;
            }

            .container {
                width: 50%; 
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .launch-btn {
                padding: 20px;
                font-size: 1.5rem;
                background: #050505;
                color: #c084fc;
                border: 2px solid transparent;
                border-radius: 12px;
                cursor: pointer;
                position: relative;
                transition: 0.2s;
            }


            .launch-btn::before {
                content: "";
                position: absolute;
                inset: -2px;
                border-radius: 12px;
                background: linear-gradient(45deg, #38bdf8, #60a5fa, #38bdf8);
                z-index: -1;
                filter: blur(6px);
                opacity: 0.7;
            }

            .launch-btn:hover {
                transform: scale(1.03);
                background: #0a0a0a;
            }
.footer {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
}

.contact-box {
    width: 50%; 
    background: #050505;
    color: #93c5fd;
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    font-size: 0.9rem;
    position: relative;
}


.contact-box::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 10px;
    background: linear-gradient(45deg, #38bdf8, #60a5fa);
    z-index: -1;
    filter: blur(4px);
    opacity: 0.6;
}
        </style>
        </head>

        <body>
            <div class="container">
                ${buttonsHTML}
            </div>

            <script>
                function loadSite(url) {
                    document.body.innerHTML = '';

                    var iframe = document.createElement('iframe');
                    iframe.style.border = 'none';
                    iframe.style.width = '100%';
                    iframe.style.height = '100vh';
                    iframe.src = url;

                    document.body.appendChild(iframe);
                }
            <\/script>
<div class="footer">
    <div class="contact-box">
    <div>This came to me in a dream</div>
        <div>Contact:</div>
        <div>omegaomeg7@gmail.com</div>
        <div>omtegu2@gmail.com</div>
        <div>himespider1@gmail.com</div>
        <div>nullframe01@gmail.com</div>\
    </div>
</div>
        </body>
        </html>
    `);

    win.document.close();
}
</script>
</body>
</html>
